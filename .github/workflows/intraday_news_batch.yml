name: Intraday News Batch

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    # 09:00, 12:00, 15:00, 17:00 KST
    # KST = UTC + 9
    # 09:00 KST -> 00:00 UTC
    # 12:00 KST -> 03:00 UTC
    # 15:00 KST -> 06:00 UTC
    # 17:00 KST -> 08:00 UTC
    - cron: '0 0,3,6,8 * * *'
  
jobs:
  intraday_news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas yfinance finance-datareader google-genai python-dotenv beautifulsoup4 requests aiohttp trafilatura markdownify

      - name: Run Intraday News Batch
        run: python execution/intraday_news_batch.py
        env:
          GOOGLE_API_KEY_1: ${{ secrets.GOOGLE_API_KEY_1 || secrets.GOOGLE_API_KEY }}
          GOOGLE_API_KEY_2: ${{ secrets.GOOGLE_API_KEY_2 }}
          GOOGLE_API_KEY_3: ${{ secrets.GOOGLE_API_KEY_3 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
