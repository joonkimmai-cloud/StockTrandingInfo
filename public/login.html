<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alpha - Admin Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --primary-gradient: linear-gradient(135deg, #7b2ff7 0%, #21d4fd 100%);
            --text-main: #f0f6fc;
            --border-color: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0d1117 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #8b949e;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #7b2ff7;
            box-shadow: 0 0 10px rgba(123, 47, 247, 0.2);
        }

        button {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(123, 47, 247, 0.3);
        }

        .error-msg {
            color: #f85149;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">ADMIN LOGIN</div>
        <div class="input-group">
            <label>Admin ID</label>
            <input type="text" id="admin-id" placeholder="관리자 아이디">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="admin-pw" placeholder="비밀번호">
        </div>
        <button onclick="handleLogin()">로그인</button>
        <div id="error-msg" class="error-msg">인증 정보가 올바르지 않습니다.</div>
    </div>

    <script>
        function handleLogin() {
            const id = document.getElementById('admin-id').value;
            const pw = document.getElementById('admin-pw').value;
            const error = document.getElementById('error-msg');

            // 간단한 관리자 인증 로직 (기본값 설정)
            if (id === 'admin' && pw === 'admin1234') {
                sessionStorage.setItem('isAdmin', 'true');
                location.href = 'admin.html';
            } else {
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
