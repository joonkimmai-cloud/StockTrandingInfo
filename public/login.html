<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alpha - Admin Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --primary-gradient: linear-gradient(135deg, #7b2ff7 0%, #21d4fd 100%);
            --text-main: #f0f6fc;
            --border-color: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0d1117 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #7b2ff7;
            box-shadow: 0 0 10px rgba(123, 47, 247, 0.2);
        }

        button {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(123, 47, 247, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            color: #f85149;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">STOCK ALPHA ADMIN</div>
        <div class="input-group">
            <label>Admin Email</label>
            <input type="email" id="admin-id" placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="admin-pw" placeholder="비밀번호를 입력하세요">
        </div>
        <button id="login-btn" onclick="handleLogin()">
            <span id="btn-text">관리자 로그인</span>
            <div id="btn-loader" class="loader"></div>
        </button>
        <div id="error-msg" class="error-msg">인증 정보가 올바르지 않거나 시스템 오류가 발생했습니다.</div>
    </div>

    <script>
        const SUPABASE_URL = "https://fwptckxvhyzydrfralhw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ZRdywELTvsTlfdU4SUCYsg_IASTgk3X";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('admin-id').value;
            const password = document.getElementById('admin-pw').value;
            const errorEl = document.getElementById('error-msg');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const loginBtn = document.getElementById('login-btn');

            if (!email || !password) {
                errorEl.style.display = 'block';
                return;
            }

            // UI Feedback
            errorEl.style.display = 'none';
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            loginBtn.disabled = true;

            try {
                // 1. Supabase에서 해당 이메일의 유저 정보(해시 포함) 가져오기
                const { data, error } = await supabaseClient
                    .from('admin_users')
                    .select('email, password_hash')
                    .eq('email', email)
                    .single();

                if (error || !data) {
                    throw new Error('User not found');
                }

                // 2. 패스워드 검증 (bcrypt.js 사용)
                // cdn 버전은 dcodeIO 객체 없이 전역 bcrypt 객체를 생성하기도 합니다.
                const bCryptLib = (typeof dcodeIO !== 'undefined') ? dcodeIO.bcrypt : bcrypt;
                const isValid = bCryptLib.compareSync(password, data.password_hash);

                if (isValid) {
                    sessionStorage.setItem('isAdmin', 'true');
                    sessionStorage.setItem('adminEmail', email);
                    location.href = 'admin.html';
                } else {
                    throw new Error('Invalid password');
                }

            } catch (err) {
                console.error(err);
                errorEl.style.display = 'block';
            } finally {
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
                loginBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
