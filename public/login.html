<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 
       login.html 
       관리자(Admin) 전용 로그인 화면의 뼈대를 그려주는 문서입니다.
       디자인(크기, 색상, 애니메이션 등)은 `login.css`에 분리했고,
       아이디/비밀번호 확인을 처리하는 핵심 코드는 `login.js`에 따로 보관했습니다.
       이렇게 나누면 소스 코드가 길어지지 않아 유지보수(수정)하기 편리합니다.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://fwptckxvhyzydrfralhw.supabase.co;">
    <title>short game</title>
    
    <!-- 1. 화면 폰트(Pretendard) 주소를 웹에서 그대로 빌려옵니다 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    
    <!-- 2. 우리가 새로 분리해서 따로 작성해둔 'login.css' 파일을 연결하여 옷을 입힙니다 -->
    <link rel="stylesheet" href="css/login.css">
    
    <!-- 3. 외부 도우미 라이브러리들 연결: DB(Supabase) 기능과 암호해독기(bcryptjs) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
</head>

<body>
    <!-- 로그인 창 전체를 하나로 묶는 가운데 제일 큰 박스(.login-card) -->
    <div class="login-card">
        
        <!-- 맨 꼭대기 굵은 시스템 로고 부분 -->
        <div class="logo">short game ADMIN</div>
        
        <!-- [아이디 영역] -->
        <div class="input-group">
            <label>Admin Email</label>
            <!-- 사용자가 키보드로 타자를 칠수 있는 창. 자바스크립트는 저 id="admin-id" 부분을 집게처럼 집어서 내용을 훔쳐봅니다. -->
            <input type="email" id="admin-id" placeholder="example@gmail.com">
        </div>
        
        <!-- [비밀번호 영역] -->
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="admin-pw" placeholder="비밀번호를 입력하세요">
        </div>
        
        <!-- 파란색 [로그인 수행] 동작 버튼. 클릭 시 JS 파일에 있는 'handleLogin()' 이라는 이름을 가진 함수를 작동시킵니다 -->
        <button id="login-btn" onclick="handleLogin()">
            <!-- 평상시 보일 기본 글자 -->
            <span id="btn-text">관리자 로그인</span>
            <!-- 숨겨둠! 처리 시간이 걸릴 때만 나와서 로딩 원을 그려줄 동그라미 공간 -->
            <div id="btn-loader" class="loader"></div>
        </button>
        
        <!-- 숨겨둠! 비번 틀리거나 서버 에러가 났을 때만 버튼 아래쪽에 빨갛게 나타날 문구 공간 -->
        <div id="error-msg" class="error-msg">인증 정보가 올바르지 않거나 시스템 오류가 발생했습니다.</div>
        
    </div>

    <!-- 4. 마지막으로, 화면의 버튼 동작을 지시하는 'login.js' 스크립트 연결 부분 -->
    <script src="js/login.js"></script>

</body>
</html>
