<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 
       index.html 
       사용자가 가장 처음 들어오는 대문(메인 페이지)의 구조(뼈대)를 작성한 문서입니다.
       디자인은 index.css 파일에, 기능(클릭 동작 등)은 index.js 파일에 완전히 분리하여 초심자도 알아보기 쉽게 나누었습니다.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alpha - 프리미엄 데일리 증권 리포트</title>
    
    <!-- 1. 글꼴(Pretendard) 파일 외부에서 가져오기 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    
    <!-- 2. 우리가 분리해 놓은 'index.css' 디자인 파일 연결 -->
    <link rel="stylesheet" href="css/index.css">
    
    <!-- 3. Supabase(데이터베이스 연결 도구)를 외부에서 가져오기 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- 내용물을 묶어 화면 정중앙에 보여주는 둥근 유리 상자(.container) -->
    <div class="container">
        
        <!-- 맨 위의 보라색 작은 태그 모양 -->
        <div class="tag">ALPHA TRADING SYSTEM</div>
        
        <!-- 메인 헤드라인 (가장 큰 글씨) -->
        <h1>Daily Spikes</h1>
        
        <!-- 서비스 설명 문구 (작은 글씨) -->
        <p>전일 거래량 급증 종목을 AI로 분석한<br>전문 에널리스트 리포트를 매일 아침 받아보세요.</p>
        
        <!-- 사용자 이메일 입력 + 버튼을 모아둔 구역 -->
        <div class="input-group">
            
            <!-- 이메일 입력 상자 (required 속성은 '반드시 입력해야 함'을 뜻함) -->
            <!-- 이메일 값 입력 시, id값인 'email' 을 이용해 자바스크립트가 추적합니다. -->
            <input type="email" id="email" placeholder="이메일 주소를 입력하세요" required>
            
            <!-- 구독 버튼을 클릭하면(onclick) 'subscribe()'라는 자바스크립트 기능을 실행! -->
            <button onclick="subscribe()" id="btnText">무료 리포트 구독하기</button>
            
        </div>
        
        <!-- 자바스크립트가 에러/성공 메시지를 텍스트로 띄워줄 빈 공간 -->
        <div id="message"></div>

        <!-- 하단 관리자(Admin) 전용 페이지로 이동하는 링크 -->
        <div class="admin-link">
            <a href="login.html">Admin Dashboard →</a>
        </div>
        
    </div>

    <!-- 4. 버튼 동작 처리 등 실질적인 로직이 담긴 'index.js' 파일 연결 (맨 마지막에) -->
    <!-- EmailJS SDK: 브라우저에서 직접 이메일 발송 -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <!-- 구독/인증 로직 -->
    <script src="js/index.js?v=6"></script>

</body>
</html>
