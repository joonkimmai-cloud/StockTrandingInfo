<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 
       index.html 
       사용자가 가장 처음 들어오는 대문(메인 페이지)의 구조(뼈대)를 작성한 문서입니다.
       디자인은 index.css 파일에, 기능(클릭 동작 등)은 index.js 파일에 완전히 분리하여 초심자도 알아보기 쉽게 나누었습니다.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Tranding Info - 프리미엄 데일리 증권 리포트</title>
    
    <!-- 1. 글꼴(Pretendard) 파일 외부에서 가져오기 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    
    <!-- 2. 우리가 분리해 놓은 'index.css' 디자인 파일 연결 -->
    <link rel="stylesheet" href="css/index.css">
    
    <!-- 3. Supabase(데이터베이스 연결 도구)를 외부에서 가져오기 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="main-wrapper">
        <header class="page-header">
            <div class="tag">Alpha Trading System</div>
            <h1>Daily Market Insights</h1>
            <p>전일 거래량 급증 종목을 AI로 분석한 고품격 증권 리포트</p>
        </header>

        <!-- 뉴스 목록으로 가는 버튼 (우측 상단) -->
        <div style="display:flex; justify-content:flex-end; max-width:1200px; margin: 0 auto 15px; padding: 0 10px;">
            <a href="news.html" class="btn-all-news">전체 소식 보기 →</a>
        </div>

        <!-- 3x3 뉴스 그리드 영역 -->
        <main class="news-grid" id="news-grid">
            <!-- 자바스크립트에 의해 로딩 시 카드가 채워집니다. -->
            <div class="loading-state">기사 데이터를 불러오는 중...</div>
        </main>

        <!-- 하단 뉴스레터 섹션 -->
        <section class="newsletter-section">
            <h2>Stay Updated with Our Newsletter</h2>
            <p>AI가 분석한 최신 종목 리포트를 당신의 이메일로 받아보세요.</p>
            <div class="input-group">
                <input type="email" id="email" placeholder="Enter your email address" required>
                <button onclick="subscribe()" id="btnText">Subscribe</button>
            </div>
            <div id="message"></div>
        </section>

        <footer class="page-footer">
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="login.html">Contact Us</a>
                <a href="login.html">Admin Dashboard</a>
            </div>
        </footer>
    </div>

    <!-- 4. 버튼 동작 처리 등 실질적인 로직이 담긴 'index.js' 파일 연결 (맨 마지막에) -->
    <!-- EmailJS SDK: 브라우저에서 직접 이메일 발송 -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <!-- 구독/인증 로직 -->
    <script src="js/index.js?v=6"></script>

</body>
</html>
